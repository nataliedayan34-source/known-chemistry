<style>

  /* ---------- PHONE ---------- */
  .phone {
    width: 320px; height: 640px; border-radius: 44px;

  .notch {

  .notif-card {

  .notif-icon {

  /* shared nav */
  .s-nav { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: auto; padding-top: 12px; }
  .nav-back { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px 14px; font-size: 12px; color: rgba(255,255,255,0.5); cursor: pointer; transition: background 0.15s; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Wave Bars ─── */
function WaveBars({ active }) {
  const [heights, setHeights] = useState(() => Array.from({length: 28}, () => 20));
  useEffect(() => {
    if (!active) return;
    const id = setInterval(() => {
      setHeights(h => h.map(() => Math.random() * 42 + 6));
    }, 90);
    return () => clearInterval(id);
  }, [active]);
  const colors = ['#7c3aed','#9333ea','#a855f7','#c084fc','#d8b4fe'];
  return (
    <div className="waveform">
      {heights.map((h, i) => (
        <div key={i} className="wave-bar" style={{
          height: h,
          background: `linear-gradient(to top, ${colors[i % colors.length]}, ${colors[(i+2) % colors.length]})`,
          opacity: active ? 1 : 0.3
        }}/>
      ))}
    </div>
  );
}

/* ─── Score Ring ─── */
function ScoreRing({ score, animate }) {
  const circum = 408;
  const offset = circum - (animate ? (score / 100) * circum : circum);
  return (
    <div className="score-ring-wrap">
      <svg className="score-svg" viewBox="0 0 140 140">
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor="#7c3aed"/>
            <stop offset="50%" stopColor="#e879f9"/>
            <stop offset="100%" stopColor="#fb923c"/>
          </linearGradient>
        </defs>
        <circle className="score-bg-circle" cx="70" cy="70" r="65"/>
        <circle className="score-fill-circle" cx="70" cy="70" r="65"
          style={{strokeDashoffset: offset, transition: animate ? 'stroke-dashoffset 1.8s cubic-bezier(0.16,1,0.3,1)' : 'none'}}/>
      </svg>
      <div className="score-center">
        <div className="score-num" style={{background:'linear-gradient(135deg,#c084fc,#f472b6,#fb923c)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent'}}>{animate ? score : 0}</div>
        <div className="score-label">chemistry</div>
      </div>
    </div>
  );
}

/* ─── Mini traits ─── */
const MINI_TRAITS = [
  {icon:'⚡', label:'Energy Match', pct:92, w:'92%'},
  {icon:'😂', label:'Humor Sync',   pct:87, w:'87%'},
  {icon:'💬', label:'Conversation', pct:78, w:'78%'},
  {icon:'🎯', label:'Values',       pct:83, w:'83%'},
];

/* ─── Full Trait Cards ─── */
const TRAITS = [
  {emoji:'⚡', name:'Energy Match', score:92, badge:'High', badgeClass:'badge-high', color:'#34d399', w:'92%', desc:"Your energy levels were almost perfectly synced — you both matched the pace and intensity of the conversation throughout the date."},
  {emoji:'😂', name:'Humor Sync',   score:87, badge:'High', badgeClass:'badge-high', color:'#c084fc', w:'87%', desc:"Your humor styles clicked. You built off each other's jokes and the laughter felt natural, not forced."},

const MOMENTS = [

/* ─── LockScreen ─── */
function LockScreen({ onNext }) {
  const now = new Date();
  const time = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const date = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
  return (
    <div className="screen s-lock" onClick={onNext} style={{cursor:'pointer'}}>
      <div className="lock-time">{time}</div>
      <div className="lock-date">{date}</div>
      <div className="notif-card">
        <div className="notif-icon">🧬</div>
        <div>
          <div className="notif-app">Known · just now</div>
          <div className="notif-title">Your chemistry report is ready</div>
          <div className="notif-body">We analyzed your date with Marcus. Tap to see your score →</div>
        </div>
      </div>
      <div className="notif-card" style={{opacity:0.5}}>
        <div className="notif-icon" style={{background:'linear-gradient(135deg,#1d4ed8,#2563eb)'}}>💬</div>
        <div>
          <div className="notif-app">Messages</div>
          <div className="notif-title">Marcus</div>
          <div className="notif-body">Had a great time tonight 😊</div>
        </div>
      </div>
      <div className="lock-swipe">tap to open →</div>
    </div>
  );
}

/* ─── DebriefScreen ─── */
function DebriefScreen({ onNext, onBack }) {
  const [step, setStep] = useState(0);
  const prompts = [
    "How did the date feel overall?",
    "What made you laugh or smile?",
    "Did conversation flow naturally?",
  ];
  useEffect(() => {
    if (step >= 3) return;
    const id = setTimeout(() => setStep(s => s+1), 900);
    return () => clearTimeout(id);
  }, [step]);
  return (
    <div className="screen s-debrief">
      <div className="s-header">Step 1 of 3</div>
      <div className="s-title">Voice Debrief</div>
      <div className="s-sub">Tell us about your date with Marcus</div>
      <div className="match-avatar-row">
        <div className="avatar-emoji">🧬</div>
        <div className="heart-divider">💜</div>
        <div className="avatar-emoji" style={{background:'linear-gradient(135deg,#1d4ed8,#db2777)'}}>🧑</div>
        <div>
          <div className="match-name">You & Marcus</div>
          <div className="match-meta">Date: earlier today</div>
        </div>
      </div>
      <WaveBars active={step < 3}/>
      <div className="debrief-prompts">
        {prompts.map((p, i) => (
          <div key={i} className={`prompt-chip ${i < step ? 'answered' : ''}`}
            style={{animationDelay: `${i * 0.1}s`, opacity: i <= step ? 1 : 0.3, transition:'opacity 0.3s'}}>
            <div className="prompt-dot"/>
            {i < step ? '✓ ' : ''}{p}
          </div>
        ))}
      </div>
      <div className="s-nav" style={{marginTop:16}}>
        <button className="nav-back" onClick={onBack}>← Back</button>
        <div className="dots">{[0,1,2,3,4,5].map(i=><div key={i} className={`dot ${i===1?'active':''}`}/>)}</div>
        <button className="nav-next" onClick={onNext}>Analyze →</button>
      </div>
    </div>
  );
}

/* ─── AnalyzingScreen ─── */
function AnalyzingScreen({ onNext }) {
  const traits = ['⚡ Energy','😂 Humor','💬 Depth','🎯 Values','🤫 Comfort'];
  const [filled, setFilled] = useState(0);
  useEffect(() => {
    const id = setInterval(() => setFilled(f => Math.min(f+1, traits.length)), 600);
    return () => clearInterval(id);
  }, []);
  useEffect(() => {
    if (filled === traits.length) {
      const id = setTimeout(onNext, 900);
      return () => clearTimeout(id);
    }
  }, [filled, onNext]);
  return (
    <div className="screen s-analyzing">
      <div className="orb">🧬</div>
      <div className="analyzing-label">Analyzing chemistry…</div>
      <div className="analyzing-sub">Reading vocal patterns, energy, sentiment & timing</div>
      <div className="trait-loading-row">
        {traits.map((t, i) => (
          <div key={i} className="trait-loading">
            <div className="tl-icon">{t.split(' ')[0]}</div>
            <div className="tl-line">
              <div className="tl-fill" style={{width: i < filled ? '100%' : '0%', transition:'width 0.5s ease-out'}}/>
            </div>
            <div style={{fontSize:11, color: i < filled ? '#c084fc' : 'rgba(255,255,255,0.2)', width:28, textAlign:'right', transition:'color 0.3s'}}>
              {i < filled ? '✓' : '…'}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── ScoreScreen ─── */
function ScoreScreen({ onNext, onBack }) {
  const [animate, setAnimate] = useState(false);
  useEffect(() => { const id = setTimeout(() => setAnimate(true), 200); return () => clearTimeout(id); }, []);
  return (
    <div className="screen s-score">
      <div className="s-header" style={{marginBottom:14}}>Chemistry Report</div>
      <ScoreRing score={84} animate={animate}/>
      <div className="vibe-pill" style={{animation: animate ? 'fade-up 0.6s 0.5s ease-out forwards' : 'none', opacity: animate ? 1 : 0}}>
        ✨ Magnetic Pull
      </div>
      <div className="score-insight">
        You and Marcus have strong natural chemistry. AI detected high energy alignment, genuine laughter, and meaningful conversation depth.
      </div>
      <div className="mini-traits">
        {MINI_TRAITS.map((t, i) => (
          <div key={i} className="mini-trait" style={{animation:`slide-in 0.4s ${0.2 + i*0.1}s ease-out forwards`, opacity:0}}>
            <div className="mt-icon">{t.icon}</div>
            <div className="mt-label">{t.label}</div>
            <div className="mt-bar-bg">
              <div className="mt-bar" style={{'--w':t.w, animationDelay:`${0.3 + i*0.1}s`}}/>
            </div>
            <div className="mt-pct">{t.pct}%</div>
          </div>
        ))}
      </div>
      <div className="s-nav" style={{marginTop:16}}>
        <button className="nav-back" onClick={onBack}>← Back</button>
        <div className="dots">{[0,1,2,3,4,5].map(i=><div key={i} className={`dot ${i===3?'active':''}`}/>)}</div>
        <button className="nav-next" onClick={onNext}>Details →</button>
      </div>
    </div>
  );
}

/* ─── BreakdownScreen ─── */
function BreakdownScreen({ onNext, onBack }) {
  return (
    <div className="screen s-breakdown">
      <div className="breakdown-header">Trait Breakdown</div>
      <div className="breakdown-sub">5 signals · AI-analyzed</div>
      {TRAITS.map((t, i) => (
        <div key={i} className="trait-card" style={{animationDelay:`${i*0.1}s`, animationFillMode:'forwards'}}>
          <div className="tc-top">
            <div className="tc-name"><span className="tc-emoji">{t.emoji}</span>{t.name}</div>

          </div>
          <div className="tc-bar-bg">
            <div className="tc-bar" style={{'--w':t.w, background:`linear-gradient(90deg, ${t.color}99, ${t.color})`, animationDelay:`${0.1+i*0.1}s`, animationFillMode:'forwards'}}/>
          </div>
          <div className="tc-desc">{t.desc}</div>
        </div>
      ))}
      <div className="s-nav" style={{marginTop:8}}>
        <button className="nav-back" onClick={onBack}>← Back</button>
        <div className="dots">{[0,1,2,3,4,5].map(i=><div key={i} className={`dot ${i===4?'active':''}`}/>)}</div>
        <button className="nav-next" onClick={onNext}>Key Moments →</button>
      </div>
    </div>
  );
}

/* ─── MomentsScreen ─── */
function MomentsScreen({ onNext, onBack }) {
  return (
    <div className="screen s-moments">
      <div className="breakdown-header" style={{marginBottom:4}}>Key Moments</div>
      <div className="breakdown-sub" style={{marginBottom:18}}>AI-detected highlights from your date</div>

          <div className="mc-label" style={{color:m.color}}>{m.label}</div>

        <div style={{fontSize:11, fontWeight:700, color:'#c084fc', marginBottom:4}}>🤖 AI Summary</div>
        <div style={{fontSize:12, color:'rgba(255,255,255,0.55)', lineHeight:1.5}}>
          Strong chemistry overall. Your connection is built on humor and depth — a rare combo. Second date recommended.
        </div>
      </div>
      <div className="s-nav" style={{marginTop:'auto'}}>
        <button className="nav-back" onClick={onBack}>← Back</button>
        <div className="dots">{[0,1,2,3,4,5].map(i=><div key={i} className={`dot ${i===5?'active':''}`}/>)}</div>
        <button className="nav-next" onClick={onNext}>Next →</button>
      </div>
    </div>
  );
}

/* ─── CTAScreen ─── */
function CTAScreen({ onRestart, onBack }) {
  return (
    <div className="screen s-cta">
      <div className="cta-emoji">💜</div>
      <div className="cta-title">Ready for round two?</div>
      <div className="cta-body">Your chemistry score is 84/100 — that's in the top 12% of Known matches. Don't let this one slip away.</div>
      <button className="cta-btn cta-primary">Book a Second Date →</button>
      <button className="cta-btn cta-secondary" onClick={onRestart}>← Start Over</button>
    </div>
  );

/* ─── Phone Demo ─── */
function PhoneDemo() {
  const [screen, setScreen] = useState(0);
  const [key, setKey] = useState(0);
  const go = useCallback((n) => { setScreen(n); setKey(k => k+1); }, []);
  const restart = useCallback(() => { setScreen(0); setKey(k => k+1); }, []);
  const screens = [
    <LockScreen onNext={() => go(1)}/>,
    <DebriefScreen key={key} onNext={() => go(2)} onBack={() => go(0)}/>,
    <AnalyzingScreen key={key} onNext={() => go(3)}/>,
    <ScoreScreen key={key} onNext={() => go(4)} onBack={() => go(2)}/>,
    <BreakdownScreen key={key} onNext={() => go(5)} onBack={() => go(3)}/>,
    <MomentsScreen key={key} onNext={() => go(6)} onBack={() => go(4)}/>,
    <CTAScreen onRestart={restart} onBack={() => go(5)}/>,
  ];
  return (
    <div className="phone">
      <div className="notch"><div className="notch-cam"/></div>
      {screens[screen]}
    </div>
  );
}
